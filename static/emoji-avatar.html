<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Avatar v3 · 复杂情绪</title>
<style>
  :root { --bg: #1a1a2e; --surface: #252540; --text: #e0e0e0; --accent: #7c83ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    user-select: none; -webkit-user-select: none; overflow: hidden;
  }
  .avatar-wrap {
    position: relative;
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .avatar-wrap.pop { transform: scale(1.06); }
  canvas {
    display: block;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  canvas.shake { animation: shake 0.4s ease-out; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)}
    40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(2px)}
  }
  .bubble {
    position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
    background: #fffef8; color: #1a1a2e; font-size: 0.8rem;
    padding: 8px 14px; border-radius: 14px; white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    letter-spacing: 0.04em; font-weight: 500;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .bubble.show { opacity:1; }
  .status-row { display:flex; align-items:center; gap:8px; font-size:0.7rem; color:#6a6a8a; letter-spacing:0.06em; height:20px; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot.cache { background:#4caf50; box-shadow:0 0 6px rgba(76,175,80,0.5); }
  .dot.llm   { background:#7c83ff; box-shadow:0 0 6px rgba(124,131,255,0.5); }
  .dot.error { background:#f44336; box-shadow:0 0 6px rgba(244,67,54,0.5); }
  .label-tag { color:#a0a0c0; font-weight:500; letter-spacing:0.03em; }
  .seq-bar { display:flex; gap:4px; align-items:center; }
  .seq-dot { width:6px; height:6px; border-radius:50%; background:#3a3a5a; transition:all 0.3s; }
  .seq-dot.active { background:var(--accent); box-shadow:0 0 6px rgba(124,131,255,0.5); transform:scale(1.3); }
  .chat-row {
    display:flex; gap:8px; align-items:center;
    background:var(--surface); border:1px solid #3a3a5a;
    border-radius:24px; padding:6px 6px 6px 18px; width:360px; max-width:90vw;
  }
  .chat-row input { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:0.85rem; font-family:inherit; letter-spacing:0.03em; }
  .chat-row input::placeholder { color:#5a5a7a; }
  .chat-row button {
    width:34px; height:34px; border-radius:50%; border:none;
    background:var(--accent); color:#fff; font-size:1rem; cursor:pointer; flex-shrink:0;
    transition:all 0.15s; display:flex; align-items:center; justify-content:center;
  }
  .chat-row button:hover { filter:brightness(1.15); }
  .chat-row button:active { transform:scale(0.9); }
  .chat-row button:disabled { opacity:0.4; cursor:default; }
  .hint { font-size:0.6rem; color:#4a4a6a; letter-spacing:0.06em; margin-top:2px; line-height:1.6; text-align:center; }
</style>
</head>
<body>

<div class="avatar-wrap" id="wrap">
  <div class="bubble" id="bubble"></div>
  <canvas id="c" width="320" height="320"></canvas>
</div>

<div class="status-row">
  <span class="dot" id="dot"></span>
  <span class="label-tag" id="labelEl">就绪</span>
  <span class="seq-bar" id="seqBar"></span>
</div>

<div class="chat-row">
  <input type="text" id="input" placeholder="试试：为了妹妹我必须活下去 / 搞错了步骤结果项目成功了" maxlength="150" autocomplete="off">
  <button id="sendBtn">↑</button>
</div>

<div class="hint">7px眼 · 8px嘴 · 4px眉×2 · 10维参数 · 情绪序列</div>

<script>
// ═══ Canvas ═══
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const bubble=document.getElementById('bubble'), wrap=document.getElementById('wrap');
const input=document.getElementById('input'), sendBtn=document.getElementById('sendBtn');
const dot=document.getElementById('dot'), labelEl=document.getElementById('labelEl');
const seqBar=document.getElementById('seqBar');

const GRID=32, SCALE=10, SIZE=320;
const BG='#1a1a2e', FACE='#ffeaa7', FACE_D='#f0d67a', OUTLINE='#d4b84c';
const DARK='#2d3436', LIGHT='#ffffff';

// ═══ Face mask ═══
function fd(r,c){return Math.sqrt((r-16)**2+(c-16)**2);}

// ═══ Helpers ═══
function lerp(a,b,t){return a+(b-a)*t;}
function lerpH(c1,c2,t){
  const h=s=>parseInt(s,16);
  const r=Math.round(lerp(h(c1.slice(1,3)),h(c2.slice(1,3)),t));
  const g=Math.round(lerp(h(c1.slice(3,5)),h(c2.slice(3,5)),t));
  const b=Math.round(lerp(h(c1.slice(5,7)),h(c2.slice(5,7)),t));
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

// ═══ Parameter state ═══
let cur = { eye_curve:0, eye_open:0.5, eye_pupil:0, mouth_curve:0, mouth_open:0, mouth_width:0.8, sparkle:0.5, brow_angle:0, brow_height:0.5, brow_asym:0 };
let tgt = { ...cur };

// ═══ Sequence player ═══
let sequence = [];         // [{params, duration_ms}, ...]
let seqIdx = 0;
let seqElapsed = 0;
let replyText = '';

function setSequence(emotions, reply) {
  sequence = emotions.map(e => ({
    params: {
      eye_curve: e.eye_curve, eye_open: e.eye_open, eye_pupil: e.eye_pupil||0,
      mouth_curve: e.mouth_curve, mouth_open: e.mouth_open, mouth_width: e.mouth_width,
      sparkle: e.sparkle, brow_angle: e.brow_angle, brow_height: e.brow_height, brow_asym: e.brow_asym,
    },
    duration: e.duration_ms || 3000,
    label: e.label || '',
  }));
  seqIdx = 0;
  seqElapsed = 0;
  replyText = reply || '';
  tgt = { ...sequence[0].params };

  // Build sequence indicator dots
  seqBar.innerHTML = sequence.map((_,i) =>
    `<span class="seq-dot${i===0?' active':''}" id="seq${i}"></span>`
  ).join('');
}

function updateSequence(dt) {
  if (sequence.length <= 1) return;
  seqElapsed += dt * 1000;
  const frame = sequence[seqIdx];
  if (seqElapsed >= frame.duration && seqIdx < sequence.length - 1) {
    // Transition to next frame: lerp over 400ms
    const overlap = Math.min(400, frame.duration * 0.3);
    seqElapsed -= frame.duration;
    seqIdx++;
    tgt = { ...sequence[seqIdx].params };
    // Update dots
    document.querySelectorAll('.seq-dot').forEach((d,i)=>{
      d.classList.toggle('active', i===seqIdx);
    });
  }
}

// ═══ Pixel generators ═══
function computeBrows(angle, height, asym) {
  const baseR = Math.round(lerp(9, 4, height));
  const lOff = -Math.round(asym * 2);
  const rOff = Math.round(asym * 2);
  const px = [];

  // Left brow: cols 7-10 (outer=left=col7, inner=right=col10)
  for (let i=0; i<4; i++) {
    const c = 7+i, isInner = i>=2;
    const rowOff = isInner ? -Math.round(angle*1.5) : Math.round(angle*1.5);
    px.push({r:baseR+rowOff+lOff, c, color:DARK});
  }
  // Right brow: cols 21-24 (inner=left=col21, outer=right=col24)
  for (let i=0; i<4; i++) {
    const c = 21+i, isInner = i<=1;
    const rowOff = isInner ? -Math.round(angle*1.5) : Math.round(angle*1.5);
    px.push({r:baseR+rowOff+rOff, c, color:DARK});
  }
  return px;
}

function computeEyes(ec, eo, ep, sp) {
  function eyeAt(cc) {
    const px=[], bR=10;
    const rows = eo<0.2?1:(eo<0.6?2:3);

    // 6 dark pixels
    if (rows===1) {
      // Closed: horizontal line
      for (let c=cc-3; c<=cc+3&&px.length<6; c++) px.push({r:bR, c, color:DARK});
    } else if (rows===2) {
      // Normal open: top 3 + bottom 3, with curve
      for (let c=cc-1; c<=cc+1; c++) px.push({r:bR-1, c, color:DARK});
      // Bottom: curve affected
      px.push({r:bR+Math.round(-ec*2), c:cc-1, color:DARK});
      px.push({r:bR+Math.round(ec),     c:cc,   color:DARK});
      px.push({r:bR+Math.round(-ec*2), c:cc+1, color:DARK});
    } else {
      // Wide ring (surprised)
      px.push({r:bR-2, c:cc-2, color:DARK});
      px.push({r:bR-2, c:cc+1, color:DARK});
      px.push({r:bR-1, c:cc-2, color:DARK});
      px.push({r:bR-1, c:cc+1, color:DARK});
      px.push({r:bR,   c:cc-2, color:DARK});
      px.push({r:bR,   c:cc+1, color:DARK});
    }

    // Pupil shift
    const ps = Math.round(ep*1.5);
    for (let k=0; k<px.length; k++) px[k].c += ps;

    // Highlight (1 pixel)
    const hlR = rows===1?bR:bR-1;
    px.push({r:hlR, c:cc+1+ps, color:lerpH(DARK, LIGHT, sp)});
    return px;
  }
  return { left:eyeAt(10), right:eyeAt(21) };
}

function computeMouth(mc, mo, mw) {
  const px=[], cc=16, hw=Math.round(lerp(2, 5.5, mw));
  const cs=cc-hw, ce=cc+hw;

  if (mo<0.25) {
    // Closed mouth: single curved line, 8 pixels
    for (let c=cs; c<=ce&&px.length<8; c++) {
      const t=(c-cs)/(ce-cs||1), edgeF=Math.abs(t-0.5)*2;
      px.push({r:19+Math.round(-mc*edgeF*2), c, color:DARK});
    }
  } else {
    // Open mouth: oval, 8 pixels
    const topR=18-Math.round(mo*0.8), botR=19+Math.round(mo*0.8);
    // Top: 3 pixels in middle
    for (let c=15; c<=17&&px.length<3; c++) px.push({r:topR, c, color:DARK});
    // Bottom: 5 pixels wider
    for (let c=cs+1; c<=ce-1&&px.length<8; c++) {
      const isE=(c===cs+1||c===ce-1);
      px.push({r:botR+(isE?Math.round(-mc):Math.round(mc*0.3)), c, color:DARK});
    }
  }
  return px;
}

// ═══ Blink ═══
function blinkPx(eyePx) {
  const rs=eyePx.map(p=>p.r), cs=eyePx.map(p=>p.c);
  const mr=Math.round(rs.reduce((a,b)=>a+b,0)/rs.length);
  const mc=Math.round((Math.min(...cs)+Math.max(...cs))/2);
  return [
    {r:mr, c:mc-1, color:DARK},{r:mr, c:mc, color:DARK},{r:mr, c:mc+1, color:DARK},
  ];
}

// ═══ Draw ═══
let frame=0, blinking=false, bobY=0, lookX=0, lookY=0;

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  lookX=((e.clientX-r.left)-r.width/2)/(r.width/2);
  lookY=((e.clientY-r.top)-r.height/2)/(r.height/2);
});
canvas.addEventListener('mouseleave',()=>{lookX=0;lookY=0;});

function drawFace() {
  const oy=Math.round(bobY), speed=0.12;
  for (const k of Object.keys(cur)) cur[k]=lerp(cur[k], tgt[k], speed);

  const cp=cur;
  ctx.fillStyle=BG; ctx.fillRect(0,0,SIZE,SIZE);

  // Debug: white border to verify canvas renders
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
  ctx.strokeRect(1,1,SIZE-2,SIZE-2);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(SIZE/2, SIZE/2+5*SCALE+oy, 13*SCALE, 6*SCALE, 0,0,Math.PI*2); ctx.fill();

  // Face
  for (let r=0; r<GRID; r++)
    for (let cc=0; cc<GRID; cc++) {
      const d=fd(r,cc); if (d>14.5) continue;
      ctx.fillStyle=d>13?OUTLINE:(d>12?FACE_D:FACE);
      ctx.fillRect(cc*SCALE, r*SCALE+oy, SCALE, SCALE);
    }

  // Eyebrows
  const browPx=computeBrows(cp.brow_angle, cp.brow_height, cp.brow_asym);
  for (const bp of browPx) {
    ctx.fillStyle=bp.color; ctx.fillRect(bp.c*SCALE, bp.r*SCALE+oy, SCALE, SCALE);
  }

  // Eyes
  const eyes=computeEyes(cp.eye_curve, cp.eye_open, cp.eye_pupil, cp.sparkle);
  let le=blinking?blinkPx(eyes.left):eyes.left;
  let re=blinking?blinkPx(eyes.right):eyes.right;
  if (!blinking) {
    const sx=Math.round(Math.max(-1,Math.min(1,lookX)));
    const sy=Math.round(Math.max(-1,Math.min(1,lookY)));
    le=le.map(ep=>({...ep, r:ep.r+sy, c:ep.c+sx}));
    re=re.map(ep=>({...ep, r:ep.r+sy, c:ep.c+sx}));
  }
  for (const ep of [...le,...re]) {
    ctx.fillStyle=ep.color; ctx.fillRect(ep.c*SCALE, ep.r*SCALE+oy, SCALE, SCALE);
  }

  // Mouth
  const mouthPx=computeMouth(cp.mouth_curve, cp.mouth_open, cp.mouth_width);
  for (const mp of mouthPx) {
    ctx.fillStyle=mp.color; ctx.fillRect(mp.c*SCALE, mp.r*SCALE+oy, SCALE, SCALE);
  }
}

// ═══ Animation ═══
let lastT=performance.now();
function animate(t) {
  const dt=Math.min((t-lastT)/1000, 0.1); lastT=t; frame++;

  bobY=Math.sin(frame*0.02)*2.5;
  if (!blinking&&frame%(150+Math.floor(Math.random()*120))===0){
    blinking=true; setTimeout(()=>{blinking=false;},120);
  }

  updateSequence(dt);
  drawFace();
  requestAnimationFrame(animate);
}

// ═══ API ═══
let pending=false, bubbleTimer=null;

async function sendMessage() {
  const text=input.value.trim();
  if (!text||pending) return;
  input.value=''; pending=true; sendBtn.disabled=true;
  dot.className='dot'; labelEl.textContent='思考中...'; seqBar.innerHTML='';

  try {
    const resp=await fetch('/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text}),
    });
    const data=await resp.json();
    if (data.error) throw new Error(data.error);

    const emotions=data.emotions||[{...data, duration_ms:3000}];
    setSequence(emotions, data.reply);
    const label=emotions[0].label||'';
    const src=data.source;

    dot.className='dot '+(src==='cache'?'cache':'llm');
    labelEl.textContent=(src==='cache'?'缓存':'LLM')+' · '+label+(emotions.length>1?` (${emotions.length}帧)`:'');
    if (data.reply) {
      bubble.textContent=data.reply; bubble.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer=setTimeout(()=>bubble.classList.remove('show'),4000);
    }
    // Pop animation
    wrap.classList.remove('pop'); void wrap.offsetWidth;
    wrap.classList.add('pop');
    setTimeout(()=>wrap.classList.remove('pop'),250);

  } catch(err) {
    dot.className='dot error'; labelEl.textContent='出错 · 重试';
    console.error(err);
  } finally {
    pending=false; sendBtn.disabled=false; input.focus();
  }
}

sendBtn.addEventListener('click',sendMessage);
input.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});

// ═══ Init ═══
dot.className='dot'; labelEl.textContent='就绪';
drawFace(); // immediate first render
requestAnimationFrame(animate);
input.focus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emoji Chat · 星空</title>
<style>
  @font-face {
    font-family: 'Zpix';
    src: url('https://cdn.jsdelivr.net/npm/zpix@3.1.0/dist/Zpix.woff2') format('woff2');
    font-display: swap;
  }
  :root { --bg: #0a0a1a; --surface: #12122a; --text: #c8c8e0; --accent: #7c83ff; --gold: #ffd700; --cyan: #00e5ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: var(--bg); color: var(--text);
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }

  /* ── Input bar ── */
  #input-row {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center;
    background:rgba(18,18,42,0.85); backdrop-filter:blur(12px);
    border:1px solid rgba(124,131,255,0.2); border-radius:24px;
    padding:6px 6px 6px 18px; width:360px; max-width:88vw;
    opacity:0; pointer-events:none; transition:opacity 0.4s;
    z-index:10;
  }
  #input-row.visible { opacity:1; pointer-events:auto; }
  #topic-bubbles {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    width:380px; max-width:88vw; z-index:9;
    opacity:0; pointer-events:none; transition:opacity 0.4s;
  }
  #topic-bubbles.visible { opacity:1; pointer-events:auto; }
  .topic-bubble {
    background:rgba(124,131,255,0.12); border:1px solid rgba(124,131,255,0.2);
    border-radius:16px; padding:6px 14px; font-size:0.7rem; color:#b0b0e0;
    cursor:pointer; white-space:nowrap; letter-spacing:0.03em;
    transition:all 0.2s; max-width:200px; overflow:hidden; text-overflow:ellipsis;
  }
  .topic-bubble:hover { background:rgba(124,131,255,0.25); border-color:var(--accent); color:#fff; }
  #input-row input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-size:0.9rem; font-family:inherit; letter-spacing:0.03em;
  }
  #input-row input::placeholder { color:#5a5a7a; }
  #input-row button {
    width:36px; height:36px; border-radius:50%; border:none;
    background:var(--accent); color:#fff; font-size:1.1rem; cursor:pointer; flex-shrink:0;
    transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    font-family:inherit;
  }
  #input-row button:hover { filter:brightness(1.15); }
  #input-row button:active { transform:scale(0.9); }
  #input-row button:disabled { opacity:0.4; cursor:default; }

  /* ── Retro Dialog ── */
  #dialog {
    position:fixed; z-index:20; min-width:200px; max-width:320px;
    background:var(--surface);
    border:3px double #4a4a8a;
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 5px #4a4a8a, 0 8px 32px rgba(0,0,0,0.6);
    padding:8px 10px 10px 10px;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
    font-family:'Zpix', 'Press Start 2P', monospace;
    font-size:13px; line-height:1.8; letter-spacing:0.04em;
    cursor:default;
  }
  #dialog.visible { opacity:1; pointer-events:auto; }
  #dialog .dlg-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:4px; padding-bottom:4px;
    border-bottom:1px solid rgba(124,131,255,0.25);
    cursor:grab;
  }
  #dialog .dlg-header:active { cursor:grabbing; }
  #dialog .dlg-header .dlg-title { color:var(--accent); font-size:11px; }
  #dialog .dlg-header .dlg-close { cursor:pointer; color:#6a6a8a; font-size:14px; line-height:1; background:none; border:none; font-family:inherit; }
  #dialog .dlg-header .dlg-close:hover { color:#f44336; }
  #dialog .dlg-body { color:#d0d0e8; word-break:break-word; }
  #dialog .dlg-body .news-ref { text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; color:var(--cyan); cursor:pointer; }
  #dialog .dlg-body .news-ref:hover { color:#fff; }
  #dialog .dlg-body .cursor-blink { display:inline-block; width:7px; height:14px; background:var(--accent); animation:blink 0.5s steps(1) infinite; vertical-align:middle; margin-left:2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .dlg-arrow { display:inline-block; color:var(--accent); font-size:10px; animation:blink 0.8s steps(1) infinite; margin-left:4px; }

  /* ── Auxiliary panel ── */
  #aux-panel {
    position:fixed; top:0; right:0; width:380px; max-width:90vw; height:100vh; height:100dvh;
    background:rgba(10,10,30,0.92); backdrop-filter:blur(20px);
    border-left:1px solid rgba(124,131,255,0.15);
    transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
    z-index:30; overflow-y:auto; padding:0;
    display:flex; flex-direction:column;
  }
  #aux-panel.open { transform:translateX(0); }
  #aux-panel .aux-header {
    position:sticky; top:0; background:rgba(10,10,30,0.95); backdrop-filter:blur(12px);
    padding:16px 20px; border-bottom:1px solid rgba(124,131,255,0.12);
    display:flex; align-items:center; gap:12px; z-index:2;
  }
  #aux-panel .aux-back {
    background:none; border:1px solid rgba(255,255,255,0.2); color:var(--text);
    padding:6px 14px; border-radius:16px; cursor:pointer; font-size:0.8rem;
    font-family:inherit; letter-spacing:0.04em;
  }
  #aux-panel .aux-back:hover { border-color:var(--accent); color:var(--accent); }
  #aux-panel .aux-tabs { display:flex; gap:4px; }
  #aux-panel .aux-tab {
    background:none; border:none; color:#6a6a8a; padding:6px 14px;
    border-radius:16px; cursor:pointer; font-size:0.8rem; font-family:inherit;
    letter-spacing:0.04em;
  }
  #aux-panel .aux-tab.active { background:rgba(124,131,255,0.15); color:var(--accent); }
  #aux-panel .aux-content { padding:16px 20px; flex:1; }

  /* Timeline */
  .timeline { position:relative; padding-left:32px; }
  .timeline::before { content:''; position:absolute; left:14px; top:4px; bottom:4px; width:2px; background:rgba(124,131,255,0.2); border-radius:1px; }
  .tl-node { position:relative; margin-bottom:20px; cursor:pointer; }
  .tl-node .tl-dot {
    position:absolute; left:-26px; top:4px; width:26px; height:26px;
    border-radius:50%; background:var(--surface); border:2px solid rgba(124,131,255,0.3);
    display:flex; align-items:center; justify-content:center; font-size:14px;
    transition:all 0.25s; z-index:1;
  }
  .tl-node:hover .tl-dot { border-color:var(--gold); box-shadow:0 0 12px rgba(255,215,0,0.25); transform:scale(1.15); }
  .tl-node .tl-date { font-size:0.65rem; color:#6a6a8a; letter-spacing:0.06em; margin-bottom:4px; }
  .tl-node .tl-preview { font-size:0.78rem; color:#b0b0d0; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tl-node.expanded .tl-preview { -webkit-line-clamp:unset; }

  /* News */
  .news-card {
    background:rgba(18,18,42,0.6); border:1px solid rgba(124,131,255,0.08);
    border-radius:12px; padding:12px 14px; margin-bottom:10px;
    cursor:pointer; transition:all 0.2s;
  }
  .news-card:hover { border-color:rgba(0,229,255,0.3); background:rgba(18,18,42,0.9); }
  .news-card .news-title { font-size:0.82rem; line-height:1.5; margin-bottom:6px; }
  .news-card .news-meta { display:flex; gap:8px; align-items:center; font-size:0.6rem; }
  .news-tag { padding:2px 8px; border-radius:10px; font-size:0.6rem; letter-spacing:0.04em; }
  .news-tag.zhihu { background:rgba(0,100,255,0.15); color:#448aff; }
  .news-tag.weibo { background:rgba(255,60,60,0.15); color:#ff5252; }
  .news-tag.github { background:rgba(100,200,100,0.15); color:#66bb6a; }

  /* Mood grid */
  .mood-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(32px,1fr)); gap:4px; }
  .mood-cell { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:default; transition:transform 0.15s; }
  .mood-cell:hover { transform:scale(1.2); z-index:1; }

  /* Sound toggle */
  #sound-toggle {
    position:fixed; bottom:20px; right:20px; z-index:15;
    width:36px; height:36px; border-radius:50%;
    background:rgba(18,18,42,0.7); border:1px solid rgba(255,255,255,0.1);
    color:#6a6a8a; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #sound-toggle:hover { border-color:var(--accent); color:var(--accent); }
  #sound-toggle.muted { color:#4a4a6a; }

  /* Memory display */
  .memory-section { margin-bottom:8px; }
  .memory-label { font-size:0.7rem; color:var(--accent); letter-spacing:0.06em; margin-bottom:8px; font-weight:500; }
  .memory-card {
    background:rgba(18,18,42,0.5); border:1px solid rgba(124,131,255,0.1);
    border-radius:12px; padding:14px 16px; font-size:0.72rem; line-height:1.8;
    color:#b0b0d0; white-space:pre-wrap; word-break:break-word;
    max-height:300px; overflow-y:auto; user-select:text; -webkit-user-select:text;
  }
  .memory-card::-webkit-scrollbar { width:3px; }
  .memory-card::-webkit-scrollbar-thumb { background:rgba(124,131,255,0.15); border-radius:2px; }

  /* Scrollbar */
  #aux-panel::-webkit-scrollbar { width:4px; }
  #aux-panel::-webkit-scrollbar-track { background:transparent; }
  #aux-panel::-webkit-scrollbar-thumb { background:rgba(124,131,255,0.2); border-radius:2px; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="topic-bubbles"></div>
<div id="input-row">
  <input type="text" id="input" placeholder="想说点什么..." maxlength="150" autocomplete="off">
  <button id="sendBtn">↑</button>
</div>

<div id="dialog">
  <div class="dlg-header">
    <span class="dlg-title">💬 头像说</span>
    <button class="dlg-close" id="dlgClose">✕</button>
  </div>
  <div class="dlg-body" id="dlgBody"></div>
</div>

<div id="aux-panel">
  <div class="aux-header">
    <button class="aux-back" id="auxBack">← 星空</button>
    <div class="aux-tabs">
      <button class="aux-tab active" data-tab="diary">📖 日记</button>
      <button class="aux-tab" data-tab="news">📡 新闻</button>
      <button class="aux-tab" data-tab="mood">🎭 情绪</button>
      <button class="aux-tab" data-tab="memory">🧠 记忆</button>
    </div>
  </div>
  <div class="aux-content" id="auxContent"></div>
</div>

<button id="sound-toggle" title="音效">🔇</button>

<script>
// ═══════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const inputRow = document.getElementById('input-row');
const input = document.getElementById('input'), sendBtn = document.getElementById('sendBtn');
const dialog = document.getElementById('dialog'), dlgBody = document.getElementById('dlgBody');
const dlgClose = document.getElementById('dlgClose');
const topicBubbles = document.getElementById('topic-bubbles');
const auxPanel = document.getElementById('aux-panel'), auxContent = document.getElementById('auxContent');
const auxBack = document.getElementById('auxBack');
const soundToggle = document.getElementById('sound-toggle');

// ═══════════════════════════════════════════
// State machine
// ═══════════════════════════════════════════
const STATE = { STARFIELD:'starfield', CONVERGING:'converging', CHAT:'chat', AUXILIARY:'auxiliary' };
let state = STATE.STARFIELD;
let stateTimer = 0;

// ═══════════════════════════════════════════
// Audio system
// ═══════════════════════════════════════════
let audioCtx = null, soundOn = false;
let ambienceNode = null, ambienceGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep() {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 800 + Math.random() * 400;
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.1);
}

function startAmbience() {
  if (!soundOn || !audioCtx || ambienceNode) return;
  ambienceGain = audioCtx.createGain();
  ambienceGain.gain.value = 0.03;
  ambienceGain.connect(audioCtx.destination);
  // Low drone using filtered noise
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  ambienceNode = audioCtx.createBufferSource();
  ambienceNode.buffer = buffer;
  ambienceNode.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  filter.Q.value = 1;
  ambienceNode.connect(filter);
  filter.connect(ambienceGain);
  ambienceNode.start();
}

function stopAmbience() {
  if (ambienceNode) {
    try { ambienceNode.stop(); } catch(e) {}
    ambienceNode = null;
    ambienceGain = null;
  }
}

soundToggle.addEventListener('click', () => {
  initAudio();
  soundOn = !soundOn;
  soundToggle.textContent = soundOn ? '🔊' : '🔇';
  soundToggle.classList.toggle('muted', !soundOn);
  if (soundOn) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (state === STATE.STARFIELD) startAmbience();
  } else {
    stopAmbience();
  }
});

// ═══════════════════════════════════════════
// Canvas sizing
// ═══════════════════════════════════════════
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (state === STATE.CHAT) updateFacePixelTargets();
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════
// Face computation (ported from original)
// ═══════════════════════════════════════════
const GRID = 32;
const FACE_COLORS = { face:'#ffeaa7', faceD:'#f0d67a', outline:'#d4b84c', dark:'#2d3436', light:'#ffffff' };

function fd(r, c) { return Math.sqrt((r-16)**2 + (c-16)**2); }
function lerp(a,b,t) { return a+(b-a)*t; }
function lerpH(c1, c2, t) {
  const h = s => parseInt(s, 16);
  const r = Math.round(lerp(h(c1.slice(1,3)), h(c2.slice(1,3)), t));
  const g = Math.round(lerp(h(c1.slice(3,5)), h(c2.slice(3,5)), t));
  const b = Math.round(lerp(h(c1.slice(5,7)), h(c2.slice(5,7)), t));
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

function getFacePixels(params) {
  const p = params;
  const pixels = [];
  // Face circle
  for (let r = 0; r < GRID; r++)
    for (let cc = 0; cc < GRID; cc++) {
      const d = fd(r, cc);
      if (d > 14.5) continue;
      const color = d > 13 ? FACE_COLORS.outline : (d > 12 ? FACE_COLORS.faceD : FACE_COLORS.face);
      pixels.push({ r, c: cc, color });
    }
  // Eyebrows
  const baseR = Math.round(lerp(9, 4, p.brow_height));
  const asym = p.brow_asym || 0;
  const lOff = -Math.round(asym * 2), rOff = Math.round(asym * 2);
  for (let i = 0; i < 4; i++) {
    const cc = 7 + i, isInner = i >= 2;
    const rowOff = isInner ? -Math.round(p.brow_angle * 1.5) : Math.round(p.brow_angle * 1.5);
    pixels.push({ r: baseR + rowOff + lOff, c: cc, color: FACE_COLORS.dark });
  }
  for (let i = 0; i < 4; i++) {
    const cc = 21 + i, isInner = i <= 1;
    const rowOff = isInner ? -Math.round(p.brow_angle * 1.5) : Math.round(p.brow_angle * 1.5);
    pixels.push({ r: baseR + rowOff + rOff, c: cc, color: FACE_COLORS.dark });
  }
  // Eyes
  function eyePx(cc) {
    const px = [], bR = 10;
    const rows = p.eye_open < 0.2 ? 1 : (p.eye_open < 0.6 ? 2 : 3);
    if (rows === 1) {
      for (let c = cc - 3; c <= cc + 3 && px.length < 6; c++) px.push({ r: bR, c, color: FACE_COLORS.dark });
    } else if (rows === 2) {
      for (let c = cc - 1; c <= cc + 1; c++) px.push({ r: bR - 1, c, color: FACE_COLORS.dark });
      px.push({ r: bR + Math.round(-p.eye_curve * 2), c: cc - 1, color: FACE_COLORS.dark });
      px.push({ r: bR + Math.round(p.eye_curve), c: cc, color: FACE_COLORS.dark });
      px.push({ r: bR + Math.round(-p.eye_curve * 2), c: cc + 1, color: FACE_COLORS.dark });
    } else {
      px.push({ r: bR - 2, c: cc - 2, color: FACE_COLORS.dark });
      px.push({ r: bR - 2, c: cc + 1, color: FACE_COLORS.dark });
      px.push({ r: bR - 1, c: cc - 2, color: FACE_COLORS.dark });
      px.push({ r: bR - 1, c: cc + 1, color: FACE_COLORS.dark });
      px.push({ r: bR, c: cc - 2, color: FACE_COLORS.dark });
      px.push({ r: bR, c: cc + 1, color: FACE_COLORS.dark });
    }
    const ps = Math.round((p.eye_pupil || 0) * 1.5);
    for (let k = 0; k < px.length; k++) px[k].c += ps;
    const hlR = rows === 1 ? bR : bR - 1;
    px.push({ r: hlR, c: cc + 1 + ps, color: lerpH(FACE_COLORS.dark, FACE_COLORS.light, p.sparkle) });
    return px;
  }
  pixels.push(...eyePx(10));
  pixels.push(...eyePx(21));
  // Mouth
  const cc = 16, hw = Math.round(lerp(2, 5.5, p.mouth_width));
  const cs = cc - hw, ce = cc + hw;
  if (p.mouth_open < 0.25) {
    for (let c = cs; c <= ce && pixels.length < 800; c++) {
      const t = (c - cs) / (ce - cs || 1), edgeF = Math.abs(t - 0.5) * 2;
      pixels.push({ r: 19 + Math.round(-p.mouth_curve * edgeF * 2), c, color: FACE_COLORS.dark });
    }
  } else {
    const topR = 18 - Math.round(p.mouth_open * 0.8), botR = 19 + Math.round(p.mouth_open * 0.8);
    for (let c = 15; c <= 17; c++) pixels.push({ r: topR, c, color: FACE_COLORS.dark });
    for (let c = cs + 1; c <= ce - 1 && pixels.length < 800; c++) {
      const isE = (c === cs + 1 || c === ce - 1);
      pixels.push({ r: botR + (isE ? Math.round(-p.mouth_curve) : Math.round(p.mouth_curve * 0.3)), c, color: FACE_COLORS.dark });
    }
  }
  return pixels;
}

// ═══════════════════════════════════════════
// Face parameters
// ═══════════════════════════════════════════
let curParams = { eye_curve:0, eye_open:0.5, eye_pupil:0, mouth_curve:0, mouth_open:0, mouth_width:0.8, sparkle:0.5, brow_angle:0, brow_height:0.5, brow_asym:0 };
let tgtParams = { ...curParams };

// Sequence player
let sequence = [], seqIdx = 0, seqElapsed = 0;
let replyText = '';

function setSequence(emotions, reply) {
  sequence = emotions.map(e => ({
    params: {
      eye_curve:e.eye_curve, eye_open:e.eye_open, eye_pupil:e.eye_pupil||0,
      mouth_curve:e.mouth_curve, mouth_open:e.mouth_open, mouth_width:e.mouth_width,
      sparkle:e.sparkle, brow_angle:e.brow_angle, brow_height:e.brow_height, brow_asym:e.brow_asym||0,
    },
    duration: e.duration_ms || 3000,
    label: e.label || '',
  }));
  seqIdx = 0; seqElapsed = 0;
  replyText = reply || '';
  tgtParams = { ...(sequence[0] ? sequence[0].params : curParams) };
}

function updateSequence(dt) {
  if (sequence.length <= 1) return;
  seqElapsed += dt * 1000;
  const frame = sequence[seqIdx];
  if (seqElapsed >= frame.duration && seqIdx < sequence.length - 1) {
    seqElapsed -= frame.duration;
    seqIdx++;
    tgtParams = { ...sequence[seqIdx].params };
  }
}

// ═══════════════════════════════════════════
// Particles / Stars
// ═══════════════════════════════════════════
const NUM_STARS = 180;
let stars = [];
let functionalPoints = []; // {starIndex, type:'diary'|'news', data:{...}}
let faceCS = 10; // cell size for face rendering
let faceOx = 0, faceOy = 0; // face origin on canvas

function makeStar(overrides = {}) {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 0.8 + Math.random() * 2.2,
    brightness: 0.3 + Math.random() * 0.7,
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.7,
    driftX: (Math.random() - 0.5) * 0.15,
    driftY: (Math.random() - 0.5) * 0.15,
    color: null, // null = white default
    isFunctional: false,
    funcType: null,
    funcData: null,
    // Convergence target
    targetX: null, targetY: null, targetColor: null,
    // Trail
    trail: [],
    ...overrides,
  };
}

function initStarfield() {
  stars = [];
  for (let i = 0; i < NUM_STARS; i++) stars.push(makeStar());
  // Assign functional points
  functionalPoints = [];
  // Fetch diary and news data to create functional points
  fetch('/api/diary').then(r=>r.json()).then(diaries => {
    if (!Array.isArray(diaries) || diaries.length === 0) return;
    const recent = diaries.slice(0, 4);
    recent.forEach((d, i) => {
      if (i >= stars.length) return;
      const s = stars[i * 7 + 3]; // spread across starfield
      if (!s) return;
      s.isFunctional = true;
      s.funcType = 'diary';
      s.funcData = d;
      s.size = 2.5 + Math.random() * 1.5;
      s.color = '#ffd700';
      s.speed = 0.8 + Math.random() * 0.4;
      functionalPoints.push({ star: s, type: 'diary', data: d });
    });
  }).catch(()=>{});
  fetch('/api/news').then(r=>r.json()).then(news => {
    if (!Array.isArray(news) || news.length === 0) return;
    const top = news.slice(0, 7);
    top.forEach((n, i) => {
      const idx = 20 + i * 13;
      if (idx >= stars.length) return;
      const s = stars[idx];
      if (!s || s.isFunctional) return;
      s.isFunctional = true;
      s.funcType = 'news';
      s.funcData = n;
      s.size = 2 + Math.random() * 1.8;
      s.color = '#00e5ff';
      s.speed = 0.9 + Math.random() * 0.5;
      functionalPoints.push({ star: s, type: 'news', data: n });
    });
  }).catch(()=>{});
}

function recomputeFaceLayout() {
  faceCS = Math.min(canvas.width, canvas.height) / 38;
  faceOx = canvas.width / 2 - 16 * faceCS;
  faceOy = canvas.height / 2 - 16 * faceCS;
}

function updateFacePixelTargets() {
  recomputeFaceLayout();
  const facePixels = getFacePixels(curParams);
  // Shuffle and assign to stars
  const shuffled = [...facePixels].sort(() => Math.random() - 0.5);
  const count = Math.min(stars.length, shuffled.length);
  for (let i = 0; i < stars.length; i++) {
    if (i < count) {
      const fp = shuffled[i];
      stars[i].targetX = faceOx + fp.c * faceCS + faceCS / 2;
      stars[i].targetY = faceOy + fp.r * faceCS + faceCS / 2;
      stars[i].targetColor = fp.color;
    } else {
      // Fly outward
      const angle = Math.random() * Math.PI * 2;
      const dist = 300 + Math.random() * 500;
      stars[i].targetX = canvas.width / 2 + Math.cos(angle) * dist;
      stars[i].targetY = canvas.height / 2 + Math.sin(angle) * dist;
      stars[i].targetColor = null;
    }
  }
}

// ═══════════════════════════════════════════
// Drawing helpers
// ═══════════════════════════════════════════
function drawStar(s, alpha = 1) {
  const a = s.brightness * alpha;
  if (a < 0.02) return;
  const color = s.color || '#ffffff';
  ctx.fillStyle = color;
  ctx.globalAlpha = a;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
  ctx.fill();
  // Glow for functional points
  if (s.isFunctional && s.size > 1.8) {
    ctx.fillStyle = color;
    ctx.globalAlpha = a * 0.2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawShootingStar() {
  // Rare shooting star
  if (Math.random() > 0.003) return;
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.5;
  const len = 60 + Math.random() * 120;
  const angle = Math.PI / 6 + Math.random() * Math.PI / 6;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  const grad = ctx.createLinearGradient(x, y, x2, y2);
  grad.addColorStop(0, 'rgba(255,255,255,0.8)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

// ═══════════════════════════════════════════
// State: STARFIELD
// ═══════════════════════════════════════════
function updateStarfield(dt) {
  for (const s of stars) {
    s.x += s.driftX * dt * 60;
    s.y += s.driftY * dt * 60;
    // Wrap around
    if (s.x < -20) s.x = canvas.width + 20;
    if (s.x > canvas.width + 20) s.x = -20;
    if (s.y < -20) s.y = canvas.height + 20;
    if (s.y > canvas.height + 20) s.y = -20;
    // Reset convergence targets
    s.targetX = null; s.targetY = null; s.targetColor = null;
    // Slowly drift functional stars back toward random area
    if (s.isFunctional && s.driftX === 0 && s.driftY === 0) {
      s.driftX = (Math.random() - 0.5) * 0.1;
      s.driftY = (Math.random() - 0.5) * 0.1;
    }
  }
}

function drawConstellations(mx, my) {
  const MAX_DIST = 120;
  const lines = [];
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MAX_DIST) {
        const alpha = (1 - dist / MAX_DIST) * 0.12;
        lines.push({ i, j, alpha });
      }
    }
  }
  for (const l of lines) {
    ctx.strokeStyle = `rgba(124,131,255,${l.alpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(stars[l.i].x, stars[l.i].y);
    ctx.lineTo(stars[l.j].x, stars[l.j].y);
    ctx.stroke();
  }
  // Cursor-connected stars
  if (mx != null) {
    const NEAR = 100;
    for (const s of stars) {
      const dx = s.x - mx, dy = s.y - my;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < NEAR) {
        const alpha = (1 - dist / NEAR) * 0.15;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 0.3;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(mx, my);
        ctx.stroke();
        s.brightness = Math.max(s.brightness, 0.7);
      }
    }
  }
}

let cursorX = null, cursorY = null;

function drawStarfield() {
  // Deep space gradient
  const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/3, 0, canvas.width/2, canvas.height, canvas.height);
  grad.addColorStop(0, '#0d0d24');
  grad.addColorStop(0.5, '#080818');
  grad.addColorStop(1, '#020208');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const t = performance.now() / 1000;
  for (const s of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
    s.brightness = 0.3 + twinkle * 0.7;
    if (s.isFunctional) s.brightness = 0.6 + twinkle * 0.4;
    drawStar(s);
  }
  drawConstellations(cursorX, cursorY);
  drawShootingStar();
}

// ═══════════════════════════════════════════
// State: CONVERGING
// ═══════════════════════════════════════════
let convergeStart = 0;
const CONVERGE_DURATION = 1.5; // seconds

function startConvergence() {
  state = STATE.CONVERGING;
  convergeStart = performance.now() / 1000;
  chatFadeIn = 0;
  initSparkleParticles();
  updateFacePixelTargets();
  for (const s of stars) {
    s.trail = [];
  }
  stopAmbience();
}

function updateConvergence(dt) {
  const elapsed = performance.now() / 1000 - convergeStart;
  const progress = Math.min(1, elapsed / CONVERGE_DURATION);
  // Ease-out
  const t = 1 - Math.pow(1 - progress, 3);

  for (const s of stars) {
    if (s.targetX == null) continue;
    const startX = s.x, startY = s.y;
    s.x = lerp(startX, s.targetX, t);
    s.y = lerp(startY, s.targetY, t);
    s.brightness = 0.5 + 0.5 * Math.sin(performance.now()/1000 * 3 + s.phase);

    // Trail
    s.trail.push({ x: s.x, y: s.y, life: 1 });
    if (s.trail.length > 8) s.trail.shift();
    for (const tr of s.trail) tr.life -= dt * 4;
    s.trail = s.trail.filter(tr => tr.life > 0);

    if (s.targetColor && progress > 0.3) {
      s.color = s.targetColor;
    }
  }

  if (progress >= 1) {
    state = STATE.CHAT;
    // Move non-face stars off-screen, keep face stars in position
    for (const s of stars) {
      if (s.targetX != null) { s.x = s.targetX; s.y = s.targetY; }
      s.trail = [];
    }
    // Scatter non-face stars outward for background use
    for (let i = 0; i < stars.length; i++) {
      if (stars[i].targetColor == null) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 150;
        stars[i].x = canvas.width / 2 + Math.cos(angle) * dist;
        stars[i].y = canvas.height / 2 + Math.sin(angle) * dist;
      }
    }
    inputRow.classList.add('visible');
    loadTopics();
    input.focus();
  }
}

function drawConvergence() {
  // Background
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const s of stars) {
    // Draw trails
    for (const tr of s.trail) {
      ctx.fillStyle = s.color || '#ffffff';
      ctx.globalAlpha = tr.life * 0.3;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, s.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    drawStar(s);
  }
}

// ═══════════════════════════════════════════
// State: CHAT
// ═══════════════════════════════════════════
let blinkTimer = 0, isBlinking = false;
let faceBob = 0, faceFrame = 0;

let sparkleParticles = [];
const NUM_SPARKLES = 55;
let chatFadeIn = 0; // 0-1 fade-in for face after convergence

function initSparkleParticles() {
  sparkleParticles = [];
  for (let i = 0; i < NUM_SPARKLES; i++) {
    sparkleParticles.push({
      idx: i,
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.5,
    });
  }
}

function updateChat(dt) {
  faceFrame++;
  faceBob = Math.sin(faceFrame * 0.02) * 2;

  // Fade in face from convergence
  if (chatFadeIn < 1) chatFadeIn = Math.min(1, chatFadeIn + dt * 2);

  // Blink
  blinkTimer -= dt;
  if (!isBlinking && blinkTimer <= 0) {
    isBlinking = true;
    setTimeout(() => { isBlinking = false; }, 120);
    blinkTimer = 2.5 + Math.random() * 3;
  }

  // Lerp params
  const speed = 0.12;
  for (const k of Object.keys(curParams)) curParams[k] = lerp(curParams[k], tgtParams[k], speed);

  updateSequence(dt);
  recomputeFaceLayout();
}

function drawFaceOnCanvas(params, oy) {
  // Draw the face using the original grid-based approach
  // Shadow
  const cx = canvas.width / 2, cy = canvas.height / 2 + 5 * faceCS + oy;
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(cx, cy, 13 * faceCS, 6 * faceCS, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face circle
  for (let r = 0; r < GRID; r++)
    for (let cc = 0; cc < GRID; cc++) {
      const d = fd(r, cc);
      if (d > 14.5) continue;
      ctx.fillStyle = d > 13 ? FACE_COLORS.outline : (d > 12 ? FACE_COLORS.faceD : FACE_COLORS.face);
      ctx.fillRect(faceOx + cc * faceCS, faceOy + r * faceCS + oy, faceCS, faceCS);
    }

  // Eyebrows
  const baseR = Math.round(lerp(9, 4, params.brow_height));
  const asym = params.brow_asym || 0;
  const lOff = -Math.round(asym * 2), rOff = Math.round(asym * 2);
  for (let i = 0; i < 4; i++) {
    const cc = 7 + i, isInner = i >= 2;
    const rowOff = isInner ? -Math.round(params.brow_angle * 1.5) : Math.round(params.brow_angle * 1.5);
    ctx.fillStyle = FACE_COLORS.dark;
    ctx.fillRect(faceOx + cc * faceCS, faceOy + (baseR + rowOff + lOff) * faceCS + oy, faceCS, faceCS);
  }
  for (let i = 0; i < 4; i++) {
    const cc = 21 + i, isInner = i <= 1;
    const rowOff = isInner ? -Math.round(params.brow_angle * 1.5) : Math.round(params.brow_angle * 1.5);
    ctx.fillStyle = FACE_COLORS.dark;
    ctx.fillRect(faceOx + cc * faceCS, faceOy + (baseR + rowOff + rOff) * faceCS + oy, faceCS, faceCS);
  }

  // Eyes
  function drawEye(cc) {
    const bR = 10, rows = params.eye_open < 0.2 ? 1 : (params.eye_open < 0.6 ? 2 : 3);
    const px = [];
    if (rows === 1) {
      for (let c = cc - 3; c <= cc + 3 && px.length < 6; c++) px.push({ r: bR, c });
    } else if (rows === 2) {
      for (let c = cc - 1; c <= cc + 1; c++) px.push({ r: bR - 1, c });
      px.push({ r: bR + Math.round(-params.eye_curve * 2), c: cc - 1 });
      px.push({ r: bR + Math.round(params.eye_curve), c: cc });
      px.push({ r: bR + Math.round(-params.eye_curve * 2), c: cc + 1 });
    } else {
      px.push({ r: bR - 2, c: cc - 2 }); px.push({ r: bR - 2, c: cc + 1 });
      px.push({ r: bR - 1, c: cc - 2 }); px.push({ r: bR - 1, c: cc + 1 });
      px.push({ r: bR, c: cc - 2 }); px.push({ r: bR, c: cc + 1 });
    }
    const ps = Math.round((params.eye_pupil || 0) * 1.5);
    for (let k = 0; k < px.length; k++) px[k].c += ps;
    const hlR = rows === 1 ? bR : bR - 1;
    px.push({ r: hlR, c: cc + 1 + ps, hl: true });
    for (const ep of px) {
      ctx.fillStyle = ep.hl ? lerpH(FACE_COLORS.dark, FACE_COLORS.light, params.sparkle) : FACE_COLORS.dark;
      ctx.fillRect(faceOx + ep.c * faceCS, faceOy + ep.r * faceCS + oy, faceCS, faceCS);
    }
  }
  drawEye(10); drawEye(21);

  // Mouth
  const mcc = 16, hw = Math.round(lerp(2, 5.5, params.mouth_width));
  const cs = mcc - hw, ce = mcc + hw;
  ctx.fillStyle = FACE_COLORS.dark;
  if (params.mouth_open < 0.25) {
    for (let c = cs; c <= ce; c++) {
      const t = (c - cs) / (ce - cs || 1), edgeF = Math.abs(t - 0.5) * 2;
      ctx.fillRect(faceOx + c * faceCS, faceOy + (19 + Math.round(-params.mouth_curve * edgeF * 2)) * faceCS + oy, faceCS, faceCS);
    }
  } else {
    const topR = 18 - Math.round(params.mouth_open * 0.8), botR = 19 + Math.round(params.mouth_open * 0.8);
    for (let c = 15; c <= 17; c++) ctx.fillRect(faceOx + c * faceCS, faceOy + topR * faceCS + oy, faceCS, faceCS);
    for (let c = cs + 1; c <= ce - 1; c++) {
      const isE = (c === cs + 1 || c === ce - 1);
      ctx.fillRect(faceOx + c * faceCS, faceOy + (botR + (isE ? Math.round(-params.mouth_curve) : Math.round(params.mouth_curve * 0.3))) * faceCS + oy, faceCS, faceCS);
    }
  }
}

function drawSparkleOverlay(oy) {
  const t = performance.now() / 1000;
  const facePixels = getFacePixels(curParams);
  const fps = facePixels;
  for (const sp of sparkleParticles) {
    const fpIdx = Math.floor(sp.idx / NUM_SPARKLES * fps.length) % fps.length;
    const fp = fps[fpIdx];
    const sparkle = 0.15 + 0.2 * Math.sin(t * sp.speed + sp.phase);
    if (sparkle < 0.05) continue;
    const sx = faceOx + fp.c * faceCS;
    const sy = faceOy + fp.r * faceCS + oy;
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = sparkle;
    ctx.fillRect(sx + faceCS * 0.25, sy + faceCS * 0.25, faceCS * 0.5, faceCS * 0.5);
  }
  ctx.globalAlpha = 1;
}

function drawChat() {
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw dim background stars
  const t = performance.now() / 1000;
  for (let i = 0; i < 25; i++) {
    const s = stars[i];
    const twinkle = 0.5 + 0.5 * Math.sin(t * 1.5 + s.phase);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.05 + twinkle * 0.08;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw the face properly
  const displayParams = isBlinking ? { ...curParams, eye_open: 0.05 } : curParams;
  drawFaceOnCanvas(displayParams, faceBob);

  // Overlay sparkle particles
  drawSparkleOverlay(faceBob);
}

// ═══════════════════════════════════════════
// Retro dialog
// ═══════════════════════════════════════════
let dlgTyping = false, dlgTimer = null;
let dlgText = '', dlgDisplayed = 0;

function showDialog(text, x, y) {
  // Position dialog near the face but not covering it
  const faceCenterX = canvas.width / 2;
  const faceCenterY = canvas.height / 2;
  const faceRadius = 16 * faceCS;

  // Try to place to the right of the face, or above if not enough space
  let dx = faceCenterX + faceRadius + 20;
  let dy = faceCenterY - 60;
  if (dx + 340 > window.innerWidth - 20) {
    dx = Math.max(10, faceCenterX - faceRadius - 340);
  }
  if (dy < 60) dy = faceCenterY + faceRadius + 20;
  if (dy + 120 > window.innerHeight - 20) dy = faceCenterY - 120;

  dialog.style.left = dx + 'px';
  dialog.style.top = dy + 'px';
  dialog.classList.add('visible');

  dlgText = text;
  dlgDisplayed = 0;
  dlgBody.innerHTML = '<span class="cursor-blink"></span>';
  dlgTyping = true;
  typeNextChar();
}

function typeNextChar() {
  if (!dlgTyping || dlgDisplayed >= dlgText.length) {
    dlgTyping = false;
    const cursors = dlgBody.querySelectorAll('.cursor-blink');
    cursors.forEach(c => c.remove());
    dlgBody.innerHTML = formatDialogText(dlgText) + '<span class="dlg-arrow">▼</span>';
    return;
  }
  dlgDisplayed++;
  const shown = dlgText.substring(0, dlgDisplayed);
  dlgBody.innerHTML = formatDialogText(shown) + '<span class="cursor-blink"></span>';
  playBeep();
  const delay = 40 + Math.random() * 50;
  dlgTimer = setTimeout(typeNextChar, delay);
}

function skipTypewriter() {
  dlgTyping = false;
  clearTimeout(dlgTimer);
  dlgBody.innerHTML = formatDialogText(dlgText) + '<span class="dlg-arrow">▼</span>';
  dlgDisplayed = dlgText.length;
}

function formatDialogText(text) {
  // Escape HTML and add news link styling
  let escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Highlight URLs as clickable news refs
  escaped = escaped.replace(/(https?:\/\/\S+)/g, '<span class="news-ref" data-url="$1">$1</span>');
  return escaped;
}

function hideDialog() {
  dlgTyping = false;
  clearTimeout(dlgTimer);
  dialog.classList.remove('visible');
  document.getElementById('choice-buttons')?.remove();
}

// JRPG-style choice buttons
function checkChoices(reply) {
  const existing = document.getElementById('choice-buttons');
  if (existing) existing.remove();

  // Detect choice patterns: emoji + text pairs, numbered items, or "/" separated
  const emojiItems = reply.match(/[🎭🤪🔇🧠😏😌✨😂🤔]/g);
  if (!emojiItems || emojiItems.length < 2) return;

  // Extract possible choices (emoji-prefixed segments)
  const segments = reply.split(/(?=[🎭🤪🔇🧠😌😂🤔🫂💪])/).filter(s => s.trim().length > 2 && s.trim().length < 40);
  if (segments.length < 2) return;

  const container = document.createElement('div');
  container.id = 'choice-buttons';
  container.style.cssText = 'position:fixed;z-index:25;display:flex;gap:6px;flex-wrap:wrap;max-width:300px;';
  const dlgRect = dialog.getBoundingClientRect();
  container.style.left = dlgRect.left + 'px';
  container.style.top = (dlgRect.bottom + 8) + 'px';

  segments.forEach(seg => {
    const btn = document.createElement('button');
    btn.textContent = seg.trim();
    btn.style.cssText = 'background:rgba(18,18,42,0.9);border:1px solid rgba(124,131,255,0.3);border-radius:12px;padding:6px 12px;color:#c8c8e0;font-size:0.7rem;cursor:pointer;font-family:inherit;letter-spacing:0.03em;transition:all 0.2s;';
    btn.onmouseenter = () => { btn.style.borderColor = 'var(--accent)'; btn.style.background = 'rgba(124,131,255,0.15)'; };
    btn.onmouseleave = () => { btn.style.borderColor = 'rgba(124,131,255,0.3)'; btn.style.background = 'rgba(18,18,42,0.9)'; };
    btn.addEventListener('click', () => {
      input.value = seg.trim();
      container.remove();
      sendMessage();
    });
    container.appendChild(btn);
  });

  document.body.appendChild(container);
  // Auto-remove after 15 seconds
  setTimeout(() => container.remove(), 15000);
}

// Click dialog to advance / double-click to skip
dlgBody.addEventListener('click', e => {
  if (e.target.closest('.news-ref')) return; // Don't interfere with link clicks
  if (dlgTyping) {
    skipTypewriter();
  }
});

dlgBody.addEventListener('dblclick', e => {
  e.preventDefault();
  skipTypewriter();
});

// Dialog dragging
let dlgDragging = false, dlgOffX = 0, dlgOffY = 0;

dialog.querySelector('.dlg-header').addEventListener('pointerdown', e => {
  if (e.target === dlgClose) return;
  dlgDragging = true;
  const rect = dialog.getBoundingClientRect();
  dlgOffX = e.clientX - rect.left;
  dlgOffY = e.clientY - rect.top;
  dialog.setPointerCapture(e.pointerId);
});

window.addEventListener('pointermove', e => {
  if (!dlgDragging) return;
  dialog.style.left = (e.clientX - dlgOffX) + 'px';
  dialog.style.top = (e.clientY - dlgOffY) + 'px';
});

window.addEventListener('pointerup', () => { dlgDragging = false; });

// Click on news ref links
dlgBody.addEventListener('click', e => {
  const ref = e.target.closest('.news-ref');
  if (ref && ref.dataset.url) window.open(ref.dataset.url, '_blank');
});

// Auxiliary panel

let auxTab = 'diary';

function openAuxiliary(tab = 'diary') {
  state = STATE.AUXILIARY;
  auxPanel.classList.add('open');
  auxTab = tab;
  document.querySelectorAll('.aux-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  loadAuxContent();
}

function closeAuxiliary() {
  auxPanel.classList.remove('open');
  state = STATE.STARFIELD;
  chatFadeIn = 0;
  initStarfield();
  if (soundOn) startAmbience();
  inputRow.classList.remove('visible');
}

auxBack.addEventListener('click', closeAuxiliary);
document.querySelectorAll('.aux-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    auxTab = tab.dataset.tab;
    document.querySelectorAll('.aux-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === auxTab));
    loadAuxContent();
  });
});

function loadAuxContent() {
  if (auxTab === 'diary') loadDiaryContent();
  else if (auxTab === 'news') loadNewsContent();
  else if (auxTab === 'mood') loadMoodContent();
  else if (auxTab === 'memory') loadMemoryContent();
}

async function loadMemoryContent() {
  auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#6a6a8a;">加载记忆中...</div>';
  try {
    const [personaR, profileR] = await Promise.all([
      fetch('/api/memory/persona'),
      fetch('/api/memory/profile')
    ]);
    const persona = await personaR.json();
    const profile = await profileR.json();

    auxContent.innerHTML = `
      <div class="memory-section">
        <div class="memory-label">🤖 AI 人设</div>
        <div class="memory-card">${escapeHtml(persona.content || '未设定').replace(/\n/g, '<br>')}</div>
      </div>
      <div class="memory-section" style="margin-top:24px;">
        <div class="memory-label">👤 用户画像</div>
        <div class="memory-card">${escapeHtml(profile.content || '未设定').replace(/\n/g, '<br>')}</div>
      </div>
      <div style="text-align:center;margin-top:24px;font-size:0.6rem;color:#4a4a6a;letter-spacing:0.04em;">
        仅通过对话逐渐拟合，不可手动编辑
      </div>
    `;
  } catch(e) {
    auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败</div>';
  }
}

// ── Mood calendar ──
async function loadMoodContent() {
  auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#6a6a8a;">加载情绪数据...</div>';
  try {
    const resp = await fetch('/api/mood/calendar?days=60');
    const data = await resp.json();
    if (!data.length) {
      auxContent.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6a6a8a;">🎭<br>还没有情绪数据</div>';
      return;
    }
    let html = '<div class="mood-grid">';
    for (const d of data) {
      const intensity = Math.min(1, d.chat_count / 20);
      const alpha = 0.15 + intensity * 0.6;
      html += `<div class="mood-cell" title="${d.date} · ${d.chat_count}次对话" style="background:rgba(124,131,255,${alpha.toFixed(2)})">${d.mood_emoji}</div>`;
    }
    html += '</div><div style="text-align:center;margin-top:16px;font-size:0.6rem;color:#5a5a7a;">颜色深浅 = 当日对话活跃度</div>';
    auxContent.innerHTML = html;
  } catch(e) {
    auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败</div>';
  }
}

async function loadDiaryContent() {
  auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#6a6a8a;">加载日记中...</div>';
  try {
    const resp = await fetch('/api/diary');
    const diaries = await resp.json();
    if (!Array.isArray(diaries) || diaries.length === 0) {
      auxContent.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6a6a8a;line-height:2;">📖<br>还没有日记<br><span style="font-size:0.7rem;">每天凌晨4点自动生成</span></div>';
      return;
    }
    const now = new Date();
    let html = '';

    // On-this-day section
    html += '<div id="onThisDay" style="margin-bottom:20px;"></div>';

    html += '<div class="timeline">' + diaries.map((d, i) => {
      const emoji = extractMoodEmoji(d.content);
      return `
        <div class="tl-node" data-date="${d.date}">
          <div class="tl-dot">${emoji}</div>
          <div class="tl-date">${d.date} · ${d.chat_count}次对话</div>
          <div class="tl-preview">${escapeHtml(d.content.substring(0, 80))}...</div>
        </div>`;
    }).join('') + '</div>';
    auxContent.innerHTML = html;

    // Load on-this-day
    (async () => {
      try {
        const r = await fetch('/api/diary/on-this-day');
        const past = await r.json();
        if (past.length) {
          const otd = document.getElementById('onThisDay');
          otd.innerHTML = '<div style="font-size:0.65rem;color:#ffd700;margin-bottom:8px;letter-spacing:0.04em;">🕰️ 去年的今天</div>' +
            past.map(p => `<div style="font-size:0.7rem;color:#a0a0c0;margin-bottom:6px;line-height:1.6;">${escapeHtml(p.date)} · ${escapeHtml((p.content||'').substring(0,60))}...</div>`).join('');
        }
      } catch(e) {}
    })();

    // Click to expand
    auxContent.querySelectorAll('.tl-node').forEach(node => {
      node.addEventListener('click', async () => {
        if (node.classList.contains('expanded')) {
          node.classList.remove('expanded');
          return;
        }
        const date = node.dataset.date;
        try {
          const r = await fetch('/api/diary/' + date);
          const full = await r.json();
          if (full.content) {
            node.querySelector('.tl-preview').textContent = full.content;
            node.classList.add('expanded');
          }
        } catch(e) {}
      });
    });
  } catch(e) {
    auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败</div>';
  }
}

async function loadNewsContent() {
  auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#6a6a8a;">加载新闻中...</div>';
  try {
    const resp = await fetch('/api/news');
    const news = await resp.json();
    if (!Array.isArray(news) || news.length === 0) {
      auxContent.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6a6a8a;line-height:2;">📡<br>还没有新闻<br><button id="fetchNewsBtn" style="margin-top:12px;background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:16px;cursor:pointer;font-family:inherit;">立即拉取</button></div>';
      const btn = document.getElementById('fetchNewsBtn');
      if (btn) btn.addEventListener('click', async () => {
        btn.textContent = '拉取中...'; btn.disabled = true;
        await fetch('/api/news/fetch', { method: 'POST' });
        loadNewsContent();
      });
      return;
    }
    auxContent.innerHTML = news.map(n => `
      <div class="news-card" data-url="${escapeHtml(n.url || '')}">
        <div class="news-title">${escapeHtml(n.title)}</div>
        <div class="news-meta">
          <span class="news-tag ${n.source}">${n.source}</span>
          <span style="color:#6a6a8a">#${n.rank}</span>
        </div>
      </div>
    `).join('');
    auxContent.querySelectorAll('.news-card').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.dataset.url;
        if (url) window.open(url, '_blank');
      });
    });
  } catch(e) {
    auxContent.innerHTML = '<div style="text-align:center;padding:40px;color:#f44336;">加载失败</div>';
  }
}

function extractMoodEmoji(text) {
  const emojiRegex = /[\p{Emoji_Presentation}\p{Extended_Pictographic}]/u;
  const match = text.match(emojiRegex);
  return match ? match[0] : '✨';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════
// Long press detection
// ═══════════════════════════════════════════
let pressTimer = null, pressStartX = 0, pressStartY = 0;
const LONG_PRESS_DURATION = 1000;
const MOVE_THRESHOLD = 10;

canvas.addEventListener('pointerdown', e => {
  pressStartX = e.clientX;
  pressStartY = e.clientY;
  pressTimer = setTimeout(() => {
    if (state === STATE.STARFIELD || state === STATE.CHAT) {
      openAuxiliary('diary');
    }
  }, LONG_PRESS_DURATION);
});

canvas.addEventListener('pointermove', e => {
  if (!pressTimer) return;
  const dx = e.clientX - pressStartX;
  const dy = e.clientY - pressStartY;
  if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
});

canvas.addEventListener('pointerup', () => {
  clearTimeout(pressTimer);
  pressTimer = null;
});

// Cursor tracking for constellation interaction
canvas.addEventListener('pointermove', e => {
  const r = canvas.getBoundingClientRect();
  cursorX = e.clientX - r.left;
  cursorY = e.clientY - r.top;
});

canvas.addEventListener('pointerleave', () => {
  clearTimeout(pressTimer);
  pressTimer = null;
  cursorX = null; cursorY = null;
});

// ═══════════════════════════════════════════
// Click to interact
// ═══════════════════════════════════════════
let clickCount = 0, clickTimer = null;

canvas.addEventListener('click', e => {
  if (state === STATE.AUXILIARY) return;
  if (pressTimer === null && Math.abs(e.clientX - pressStartX) < MOVE_THRESHOLD) {
    // Check if clicked a functional point in starfield
    if (state === STATE.STARFIELD) {
      for (const fp of functionalPoints) {
        const s = fp.star;
        const dx = e.clientX - s.x;
        const dy = e.clientY - s.y;
        if (Math.sqrt(dx*dx + dy*dy) < s.size * 3) {
          openAuxiliary(fp.type === 'diary' ? 'diary' : 'news');
          return;
        }
      }
    }

    // Count clicks for convergence trigger
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 600);
    if (clickCount >= 3 && state === STATE.STARFIELD) {
      clickCount = 0;
      startConvergence();
    }
  }
});

// ═══════════════════════════════════════════
// Input / Chat
// ═══════════════════════════════════════════
let pending = false;

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
  if (state === STATE.STARFIELD) startConvergence();
});

input.addEventListener('focus', () => {
  if (state === STATE.STARFIELD) startConvergence();
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text || pending) return;
  if (state !== STATE.CHAT) return;

  input.value = ''; pending = true; sendBtn.disabled = true;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const emotions = data.emotions || [{ ...data, duration_ms: 3000 }];
    setSequence(emotions, data.reply);

    if (data.reply) {
      showDialog(data.reply);
      checkChoices(data.reply);
    }
  } catch(err) {
    showDialog('嗯...出了点问题 😢');
    console.error(err);
  } finally {
    pending = false; sendBtn.disabled = false; input.focus();
  }
}

// Topic bubbles
async function loadTopics() {
  try {
    const resp = await fetch('/api/news/topics');
    const topics = await resp.json();
    if (!topics.length) { topicBubbles.classList.remove('visible'); return; }
    topicBubbles.innerHTML = topics.map(t =>
      `<span class="topic-bubble" data-prompt="${escapeHtml(t.prompt)}">${escapeHtml(t.prompt)}</span>`
    ).join('');
    topicBubbles.classList.add('visible');
    topicBubbles.querySelectorAll('.topic-bubble').forEach(b => {
      b.addEventListener('click', () => {
        const prompt = b.dataset.prompt;
        input.value = prompt;
        topicBubbles.classList.remove('visible');
        sendMessage();
      });
    });
  } catch(e) { topicBubbles.classList.remove('visible'); }
}

sendBtn.addEventListener('click', sendMessage);

// ═══════════════════════════════════════════
// Main loop
// ═══════════════════════════════════════════
let lastT = performance.now();

function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;

  switch (state) {
    case STATE.STARFIELD:
      updateStarfield(dt);
      drawStarfield();
      break;
    case STATE.CONVERGING:
      updateConvergence(dt);
      drawConvergence();
      break;
    case STATE.CHAT:
      updateChat(dt);
      drawChat();
      break;
    case STATE.AUXILIARY:
      // Static background
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      break;
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
initStarfield();
recomputeFaceLayout();
initSparkleParticles();
// Initial face pixel computation for convergence targets
curParams = { eye_curve:0, eye_open:0.5, eye_pupil:0, mouth_curve:0, mouth_open:0, mouth_width:0.8, sparkle:0.5, brow_angle:0, brow_height:0.5, brow_asym:0 };
tgtParams = { ...curParams };
requestAnimationFrame(loop);
</script>

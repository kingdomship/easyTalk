services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: emotion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emotion"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-${DEEPSEEK_API_KEY}}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=emotion
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-123456}
    volumes:
      - /home/xuwl/app/easyChat/memory:/app/memory
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
